<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LOAD404 CARGO</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

<h1>LOAD404 CARGO</h1>

<div class="section">
<h2>Shipment Control</h2>

<input id="shipId" placeholder="Shipment ID">
<input id="address" placeholder="Delivery Address">

<button onclick="addShipment()">Register Shipment</button>
<button onclick="deleteShipment()">Delete Shipment</button>
<button onclick="printAll()">Print All Shipments</button>

<div id="shipments"></div>
</div>

<div class="section">
<h2>Address System</h2>

<input id="search" placeholder="Search address / neighborhood">
<button onclick="searchAddress()">Search</button>

<div id="searchOut"></div>
</div>

<div class="section">
<h2>Optimal Distribution Route</h2>

<button onclick="buildRoute()">Build Optimal Route</button>

<div id="routeOut"></div>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
