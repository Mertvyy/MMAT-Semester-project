<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LOAD404 CARGO</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

<h1>LOAD404 CARGO</h1>

<div class="section">
<h2>Intake Buffer (DLL)</h2>

<input id="pkgId" placeholder="Package ID">
<input id="dest" placeholder="Destination">

<button onclick="addToBuffer()">Insert At Tail</button>
<button onclick="removeFromBuffer()">Remove From Head</button>

<div id="buffer"></div>
</div>

<div class="section">
<h2>Dispatch Queue (FIFO)</h2>
<button onclick="enqueue()">Enqueue</button>
<button onclick="dequeue()">Dequeue</button>
<div id="queue"></div>
</div>

<div class="section">
<h2>Truck Stack (LIFO)</h2>
<button onclick="pushTruck()">Push</button>
<button onclick="popTruck()">Pop</button>
<div id="stack"></div>
</div>

<div class="section">
<h2>City Routing (Graph)</h2>

<input id="start" placeholder="Start">
<input id="end" placeholder="End">

<button onclick="shortestPath()">Dijkstra</button>
<button onclick="mst()">MST</button>

<div id="graphOut"></div>
</div>

<div class="section">
<h2>AVL Search (Database)</h2>

<input id="searchKey" placeholder="Neighborhood">
<button onclick="searchAVL()">Search</button>

<div id="avlOut"></div>
</div>

<div class="section">
<h2>Master Registry (SLL Log)</h2>
<button onclick="loadLog()">Refresh Log</button>
<div id="log"></div>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
